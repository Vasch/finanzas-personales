<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanzas Personales</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      padding: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1rem; }
    .card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .status { font-size: 13px; color: #888; }
    .status.ok { color: #3B6D11; }
    .status.err { color: #A32D2D; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
    th { font-weight: 500; color: #888; font-size: 11px; }
    .empty { color: #888; font-size: 13px; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <h1>Finanzas personales</h1>
  
  <div class="card">
    <p class="status" id="status">Conectando a la base de datos...</p>
  </div>

  <div class="card">
    <h2 style="font-size: 14px; margin-bottom: 8px;">Diccionario</h2>
    <div id="diccionario-content">
      <p class="empty">Cargando...</p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://wdwlacdxlvrlthognfzn.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_3j__spC7dmwoMYibLZPXPQ_eTm-nC-6'

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    async function cargarDiccionario() {
      const statusEl = document.getElementById('status')
      const contentEl = document.getElementById('diccionario-content')

      try {
        const { data, error } = await supabase
          .from('diccionario')
          .select('*')
          .order('categoria')

        if (error) throw error

        statusEl.textContent = '✓ Conectado a Supabase correctamente'
        statusEl.className = 'status ok'

        if (!data || data.length === 0) {
          contentEl.innerHTML = '<p class="empty">Diccionario vacío. Cuando subas cartolas, los códigos se irán guardando aquí.</p>'
        } else {
          contentEl.innerHTML = `
            <table>
              <thead>
                <tr><th>Código</th><th>Significado</th><th>Categoría</th><th>Tipo</th></tr>
              </thead>
              <tbody>
                ${data.map(d => `
                  <tr>
                    <td>${d.codigo}</td>
                    <td>${d.significado}</td>
                    <td>${d.categoria}</td>
                    <td>${d.tipo}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `
        }
      } catch (err) {
        statusEl.textContent = '✗ Error: ' + err.message
        statusEl.className = 'status err'
        contentEl.innerHTML = ''
      }
    }

    cargarDiccionario()
  </script>
</body>
</html>

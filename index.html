<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanzas personales</title>
  <link rel="stylesheet" id="styles-link">
  <script>
    document.getElementById('styles-link').href = 'styles.css?v=' + Date.now()
  </script>
</head>
<body>
  <header>
    <h1>Finanzas</h1>
    <nav id="nav">
      <button class="nav-btn active" data-tab="inicio">Inicio</button>
      <button class="nav-btn" data-tab="movimientos">Movimientos</button>
      <button class="nav-btn" data-tab="diccionario">Diccionario</button>
      <button class="nav-btn" data-tab="presupuestos">Presupuestos</button>
    </nav>
  </header>

  <main>
    <section id="tab-inicio" class="tab active">
      <div class="card">
        <h2>Subir cartola</h2>
        <p class="hint">Formato: XLS de Banco de Chile (débito o TC)</p>
        <input type="file" id="file-input" accept=".xls,.xlsx,.csv" />
        <div id="upload-status"></div>
      </div>

      <div class="metrics" id="metrics-inicio"></div>

      <div class="card">
        <h2>Gasto mensual</h2>
        <div class="chart-wrap"><canvas id="chart-mensual"></canvas></div>
      </div>

      <div class="card">
        <h2>Por categoría</h2>
        <div class="chart-wrap"><canvas id="chart-cat"></canvas></div>
      </div>

      <div class="card">
        <h2>Ingresos por fuente</h2>
        <div class="chart-wrap"><canvas id="chart-ing"></canvas></div>
      </div>
    </section>

    <section id="tab-movimientos" class="tab">
      <div class="card">
        <h2>Movimientos</h2>
        <div class="filters">
          <select id="f-mes"><option value="">Todos los meses</option></select>
          <select id="f-cat"><option value="">Todas las categorías</option></select>
          <select id="f-tipo">
            <option value="">Todos los tipos</option>
            <option value="Necesario">Necesario</option>
            <option value="Prescindible">Prescindible</option>
            <option value="Ingreso">Ingreso</option>
            <option value="Sin clasificar">Sin clasificar</option>
          </select>
          <input type="search" id="f-texto" placeholder="Buscar descripción..." />
        </div>
        <div id="movs-list"></div>
      </div>
    </section>

    <section id="tab-diccionario" class="tab">
      <div class="card">
        <h2>Diccionario</h2>
        <button class="btn-primary" id="btn-add-dic">+ Agregar concepto</button>
        <div id="dic-list"></div>
      </div>
    </section>

    <section id="tab-presupuestos" class="tab">
      <div class="card">
        <h2>Presupuestos mensuales</h2>
        <button class="btn-primary" id="btn-add-pres">+ Agregar presupuesto</button>
        <div id="pres-list"></div>
      </div>
    </section>
  </main>

  <div id="modal-bg" class="modal-bg">
    <div class="modal" id="modal-content"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script type="module">
    const v = Date.now()
    const script = document.createElement('script')
    script.type = 'module'
    script.src = 'app.js?v=' + v
    document.body.appendChild(script)
  </script>
</body>
</html>
